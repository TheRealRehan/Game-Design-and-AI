<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bolt Heist</title>
  <link rel="stylesheet" href="style.css?v=premium-rehan-gold-v14">
</head>
<body>
  <main class="shell">
    <section class="game-wrap" aria-label="Bolt Heist playable prototype">
      <canvas id="game" width="960" height="640"></canvas>

      <div class="hud" aria-live="polite">
        <div><span>Heat</span><strong id="levelText">1</strong></div>
        <div><span>Speed</span><strong id="speedText">0 mph</strong></div>
        <div><span>Cash</span><strong id="cashText">$0</strong></div>
        <div><span>Lives</span><strong id="progressText">3</strong></div>
      </div>

      <div id="screen" class="overlay">
        <div class="panel">
          <p class="eyebrow">Arcade driving prototype</p>
          <h1>Bolt Heist</h1>
          <p id="screenText">
            You stole the wrong car. Survive an endless escape, dodge traffic, and grab upgrades from the road.
          </p>
          <div id="upgradePanel" class="upgrades" hidden>
            <button id="speedUpgrade" type="button"></button>
            <button id="handlingUpgrade" type="button"></button>
          </div>
          <div class="actions">
            <button id="primaryButton" type="button">Start Heist</button>
            <button id="secondaryButton" type="button" hidden>Retry Level</button>
          </div>
          <p class="controls">Move with A/D or arrow keys. Road upgrades are risky but powerful.</p>
        </div>
      </div>
    </section>
  </main>
  <script src="game-endless.js?v=premium-rehan-gold-v14"></script>
</body>
</html>
